<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="theme-color" content="#1e3a8a" />

    <!-- Security: Content Security Policy -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' https://checkout.razorpay.com https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://control.msg91.com https://generativelanguage.googleapis.com https://api.razorpay.com https://lumberjack.razorpay.com https://api.open-meteo.com https://geocoding-api.open-meteo.com https://ipapi.co https://api.ipify.org https://api.qrserver.com https://accounts.google.com; media-src 'self' blob: https://assets.mixkit.co; frame-src https://api.razorpay.com https://checkout.razorpay.com https://accounts.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
    />
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="serviceworker" href="/sw.js" />
    <link rel="apple-touch-icon" href="/icons/swadeshi-icon-192.png" />

    <!-- Preconnect to speed up font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <!-- Load fonts with font-display: swap for better performance -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <title>Swadeshi Solutions — Restaurant POS &amp; Billing Software (India)</title>
    <meta
      name="description"
      content="GST-compliant restaurant POS and billing software for India. Manage orders, menu, KOT, inventory, tables, staff, and Zomato/Swiggy in one dashboard."
    />
    <link rel="canonical" href="https://tasty-bite-harbor.lovable.app/" />
    <meta property="og:title" content="Swadeshi Solutions — Restaurant POS &amp; Billing Software" />
    <meta
      property="og:description"
      content="GST-compliant restaurant POS and billing software for India. Orders, menu, KOT, inventory, tables, staff, and Zomato/Swiggy in one dashboard."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tasty-bite-harbor.lovable.app/" />
    <meta property="og:image" content="https://tasty-bite-harbor.lovable.app/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Swadeshi Solutions",
        "url": "https://tasty-bite-harbor.lovable.app/",
        "logo": "https://tasty-bite-harbor.lovable.app/swadeshi-logo2.png"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Removed: gptengineer.js (untrusted third-party script — XSS vector) -->
    <script type="module" src="/src/main.tsx"></script>

    <!-- Service Worker Registration -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/sw.js")
            .then((registration) => {
              console.log("SW registered:", registration.scope);
            })
            .catch((error) => {
              console.log("SW registration failed:", error);
            });
        });
      }
    </script>
  </body>
</html>
