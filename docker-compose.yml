services:
  dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev"

  prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
